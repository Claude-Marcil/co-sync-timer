<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CO Rollout Progress</title>
<style>
  :root{
    --bg1:#0e1726; --bg2:#0a0f1a; --card:#111a2b;
    --ink:#e7eef7; --muted:#7e8ba3; --track:#1c2740;
    --g1:#22d39a; --g2:#3ad6c4; --g3:#5ee0ff;   /* emerald → teal → cyan */
    --glow:rgba(46,214,170,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse 120% 100% at 50% 0%, var(--bg1) 0%, var(--bg2) 70%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); display:flex; align-items:center; justify-content:center;
    padding:5vmin 6vmin; min-height:100%; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  .card{
    width:min(680px,100%);
    background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)) , var(--card);
    border:1px solid rgba(255,255,255,.07); border-radius:18px;
    padding:clamp(20px,4vw,34px) clamp(22px,4.5vw,40px);
    box-shadow:0 24px 60px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.06) inset;
  }
  .top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .label{ font-size:clamp(11px,1.5vw,13px); letter-spacing:.22em; text-transform:uppercase;
           color:var(--muted); font-weight:700; }
  .kicker{ font-size:clamp(10px,1.4vw,12px); letter-spacing:.18em; text-transform:uppercase;
           color:var(--muted); font-weight:600; opacity:.8; }
  .figure{ display:flex; align-items:flex-end; gap:14px; margin:14px 0 18px; }
  .pct{
    font-size:clamp(46px,11vw,74px); font-weight:800; line-height:.9; letter-spacing:-.02em;
    background:linear-gradient(95deg,var(--g1),var(--g3)); -webkit-background-clip:text;
    background-clip:text; color:transparent; text-shadow:0 0 28px var(--glow);
  }
  .pct span{ font-size:.42em; font-weight:700; -webkit-text-fill-color:var(--muted); margin-left:.06em; }
  .frac{ margin-bottom:.5em; font-size:clamp(13px,2.1vw,16px); color:var(--ink); font-weight:600; }
  .frac b{ color:#fff; }
  .frac small{ color:var(--muted); font-weight:500; }
  /* bar */
  .track{ position:relative; height:clamp(16px,2.6vw,22px); background:var(--track);
          border-radius:999px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.4) inset; }
  .fill{ position:absolute; inset:0 auto 0 0; width:0;
         background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3));
         border-radius:999px; box-shadow:0 0 18px var(--glow);
         transition:width 1.6s cubic-bezier(.16,1,.3,1); }
  .fill::after{ content:""; position:absolute; inset:0;
         background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
         transform:translateX(-100%); animation:sheen 2.6s ease-in-out 1.2s infinite; }
  @keyframes sheen{ 0%{transform:translateX(-100%);} 60%,100%{transform:translateX(320%);} }
  .ticks{ position:absolute; inset:0; display:flex; justify-content:space-between;
          padding:0 0; pointer-events:none; }
  .ticks i{ width:1px; background:rgba(255,255,255,.06); }
  .foot{ display:flex; align-items:center; justify-content:space-between; gap:14px;
         margin-top:16px; flex-wrap:wrap; }
  .chip{ display:inline-flex; align-items:center; gap:8px; font-size:clamp(12px,1.8vw,14px);
         color:var(--muted); font-weight:500; }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--g1); box-shadow:0 0 8px var(--glow); }
  .chip b{ color:var(--ink); font-weight:700; }
  .updated{ font-size:11px; color:var(--muted); opacity:.6; letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="label" id="label">CO Automation Rollout</div>
      <div class="kicker">Departments live</div>
    </div>
    <div class="figure">
      <div class="pct"><span id="num">0</span><span>%</span></div>
      <div class="frac"><b id="live">0</b> / <span id="total">0</span> <small>departments live</small></div>
    </div>
    <div class="track">
      <div class="ticks" id="ticks"></div>
      <div class="fill" id="fill"></div>
    </div>
    <div class="foot">
      <div class="chip"><span class="dot"></span><b id="scoped">0</b>&nbsp;of&nbsp;<span id="ptot">22</span> partners scoped</div>
      <div class="updated" id="updated"></div>
    </div>
  </div>
<script>
  const q = new URLSearchParams(location.search);
  const live = Math.max(0, parseInt(q.get('live')) || 0);
  const total = Math.max(1, parseInt(q.get('total')) || 1);
  const scoped = q.has('scoped') ? (parseInt(q.get('scoped'))||0) : 22;
  const ptot = q.has('partners') ? (parseInt(q.get('partners'))||22) : 22;
  const label = q.get('label'); const updated = q.get('updated');
  const pct = Math.round(100 * live / total);

  if(label) document.getElementById('label').textContent = label;
  document.getElementById('live').textContent = live;
  document.getElementById('total').textContent = total;
  document.getElementById('scoped').textContent = scoped;
  document.getElementById('ptot').textContent = ptot;
  if(updated) document.getElementById('updated').textContent = 'Updated ' + updated;

  // tick marks (10 segments)
  const ticks = document.getElementById('ticks');
  for(let i=1;i<10;i++){ const s=document.createElement('i'); ticks.appendChild(s); }

  // animate fill + count-up
  const fill = document.getElementById('fill'), num = document.getElementById('num');
  requestAnimationFrame(()=>{ setTimeout(()=>{ fill.style.width = pct + '%'; }, 120); });
  const dur=1500, t0=performance.now();
  function step(t){ const k=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-k,3);
    num.textContent = Math.round(e*pct); if(k<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
</script>
</body>
</html>
